<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Bunyards Coin & Stamps</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Lato',sans-serif;background:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .box{background:#fff;border-radius:16px;padding:40px 32px;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
  .icon{font-size:48px;margin-bottom:12px;}
  h2{font-family:'Playfair Display',serif;font-size:24px;color:#1a1a1a;margin-bottom:6px;}
  .sub{font-size:13px;color:#888;margin-bottom:24px;}
  input[type=password]{width:100%;padding:12px 16px;font-size:16px;border:2px solid #e2e8f0;border-radius:8px;outline:none;margin-bottom:12px;}
  input[type=password]:focus{border-color:#b8860b;}
  .btn{width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:0.5px;}
  .btn:hover{background:#333;}
  .err{color:#dc2626;font-size:13px;margin-bottom:12px;display:none;}
  .back{display:block;margin-top:16px;font-size:12px;color:#94a3b8;text-decoration:none;}
  .back:hover{color:#666;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato&display=swap" rel="stylesheet">
</head>
<body>
<div class="box">
  <div class="icon">🔐</div>
  <h2>Admin Access</h2>
  <p class="sub">Bunyards Coin & Stamps · Staff Only</p>
  <div class="err" id="err">Incorrect password. Try again.</div>
  <input type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
  <button class="btn" onclick="login()">Sign In</button>
  <a href="/" class="back">← Back to site</a>
</div>
<script>
const PASS = 'Coinguy6$';
async function login(){
  const v = document.getElementById('pw').value;
  if(v === PASS){
    sessionStorage.setItem('bunyards_admin','1');
    // Also set server-side session so /trading auto-unlocks
    try {
      await fetch('/api/admin/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ password: v })
      });
    } catch(e) { /* non-fatal */ }
    window.location.href = '/admin-dashboard';
  } else {
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
document.getElementById('pw').focus();
</script>
</body>
</html>
